<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Groups - StudyForge</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/study groups.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
</head>
<body>
    <div id="notification" style="display:none;position:fixed;top:90px;right:30px;z-index:3000;min-width:220px;padding:1rem 2rem;background:linear-gradient(45deg,#3498DB,#00F5FF);color:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.3);font-weight:600;font-size:1.1rem;transition:opacity 0.3s;"></div>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Study<span>Forge</span></a>
            <div class="user-menu">
                <img src="images/profile.jpg" alt="User Avatar" class="avatar">
                <div class="user-dropdown">
                    <a href="profile.html">Profile</a>
                    <a href="settings.html">Settings</a>
                    <a href="index.html">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="menu-item active">
                    <i class="fas fa-users"></i>
                    <span>Study Groups</span>
                </a>
                <a href="schedule.html" class="menu-item">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Schedule</span>
                </a>
                <a href="resources.html" class="menu-item">
                    <i class="fas fa-book"></i>
                    <span>Resources</span>
                </a>
                <a href="progress.html" class="menu-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Progress</span>
                </a>
                <a href="settings.html" class="menu-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1>Study Groups</h1>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <i class="fas fa-plus"></i> Create Group
                </button>
            </div>

            <!-- Search and Filter Bar -->
            <div class="search-filter-bar glass-card">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search study groups..." id="searchInput">
                </div>
                <div class="filter-dropdown">
                    <div class="dropdown-btn">
                        <i class="fas fa-filter"></i> Filter
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
                <div class="sort-dropdown">
                    <div class="dropdown-btn">
                        <i class="fas fa-sort"></i> Sort
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>

            <!-- Groups Grid -->
            <div class="groups-grid" id="groupsGrid">
                <!-- Groups will be rendered here dynamically -->
            </div>
        </main>
    </div>

    <!-- Create Group Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>Create New Study Group</h2>
                <button class="close-btn" onclick="closeCreateModal()">&times;</button>
            </div>
            <form id="createGroupForm">
                <div class="form-group">
                    <label for="groupName">Group Name</label>
                    <input type="text" id="groupName" name="groupName" required>
                </div>
                <div class="form-group">
                    <label for="groupSubject">Subject</label>
                    <select id="groupSubject" name="groupSubject" required>
                        <option value="">Select Subject</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Artificial Intelligence">Artificial Intelligence</option>
                        <option value="Web Development">Web Development</option>
                        <option value="Information Security">Information Security</option>
                        <option value="Data Science">Data Science</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="groupDescription">Description</label>
                    <textarea id="groupDescription" name="groupDescription" placeholder="Describe your study group..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="meetingTime">Meeting Time</label>
                    <input type="datetime-local" id="meetingTime" name="meetingTime" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Group</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Notification UI
        function showNotification(message) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.style.display = 'block';
            notif.style.opacity = '1';
            setTimeout(() => {
                notif.style.opacity = '0';
                setTimeout(() => notif.style.display = 'none', 400);
            }, 2000);
        }

        // Modal functions
        function openCreateModal() {
            document.getElementById('createModal').style.display = 'block';
        }

        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('createModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        // Fetch and render groups
        const API_BASE_URL = 'http://localhost:8000/api';
        
        async function fetchAndRenderGroups() {
            const grid = document.getElementById('groupsGrid');
            grid.innerHTML = '<div style="color:#fff;">Loading groups...</div>';
            try {
                const res = await fetch(`${API_BASE_URL}/study-groups/all`, { 
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Failed to fetch groups');
                if (!data.data || !Array.isArray(data.data) || data.data.length === 0) {
                    grid.innerHTML = '<div style="color:#fff;">No groups found.</div>';
                    return;
                }
                grid.innerHTML = '';
                data.data.forEach(group => {
                    const card = document.createElement('div');
                    card.className = 'group-card glass-card';
                    card.dataset.groupId = group._id;
                    card.innerHTML = `
                        <div class="group-header">
                            <div class="group-info">
                                <h3>${group.groupName}</h3>
                                <div class="group-subject">${group.subject}</div>
                            </div>
                            <div class="group-status status-${group.status || 'active'}">${group.status ? group.status.charAt(0).toUpperCase() + group.status.slice(1) : 'Active'}</div>
                        </div>
                        <p class="group-description">${group.description}</p>
                        <div class="group-stats">
                            <div class="stat">
                                <i class="fas fa-users"></i>
                                <span>${group.members ? group.members.length : 1} members</span>
                            </div>
                            <div class="stat">
                                <i class="fas fa-clock"></i>
                                <span>Next: ${group.meetingTime ? new Date(group.meetingTime).toLocaleString() : 'N/A'}</span>
                            </div>
                        </div>
                        <div class="group-actions">
                            <button class="btn-join">Join Group</button>
                            <button class="btn-info"><i class="fas fa-info"></i></button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                attachGroupActionListeners();
            } catch (err) {
                grid.innerHTML = `<div style='color:#fff;'>${err.message}</div>`;
            }
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const groupCards = document.querySelectorAll('.group-card');
            
            groupCards.forEach(card => {
                const title = card.querySelector('h3').textContent.toLowerCase();
                const subject = card.querySelector('.group-subject').textContent.toLowerCase();
                const description = card.querySelector('.group-description').textContent.toLowerCase();
                
                if (title.includes(searchTerm) || subject.includes(searchTerm) || description.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // Attach listeners to join/info buttons after rendering
        function attachGroupActionListeners() {
            document.querySelectorAll('.btn-join').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    const groupCard = e.target.closest('.group-card');
                    const groupId = groupCard.dataset.groupId;
                    try {
                        const response = await fetch(`http://localhost:8000/api/study-groups/join/${groupId}`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${localStorage.getItem('token')}`
                            },
                            credentials: 'include'
                        });
                        const data = await response.json();
                        if (response.ok) {
                            e.target.textContent = 'Joined!';
                            e.target.style.background = 'linear-gradient(45deg, #28a745, #20c997)';
                            e.target.disabled = true;
                            showNotification('Joined group successfully!');
                            setTimeout(() => {
                                e.target.textContent = 'View Group';
                                e.target.style.background = 'linear-gradient(45deg, var(--secondary-color), var(--accent-color))';
                                e.target.disabled = false;
                            }, 2000);
                        } else {
                            showNotification(data.message || 'Failed to join group');
                        }
                    } catch (error) {
                        showNotification('Failed to join group');
                    }
                });
            });
            document.querySelectorAll('.btn-info').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const groupCard = e.target.closest('.group-card');
                    const groupName = groupCard.querySelector('h3').textContent;
                    showNotification(`More information about ${groupName} will be shown here.`);
                });
            });
        }

        // On page load, fetch groups
        fetchAndRenderGroups();

        // Form submission
        document.getElementById('createGroupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const groupData = Object.fromEntries(formData);
            
            try {
                // Check if backend is accessible
                try {
                    await fetch(API_BASE_URL, { method: 'HEAD' });
                } catch (error) {
                    throw new Error('Backend server is not running. Please start the server and try again.');
                }

                const response = await fetch(`${API_BASE_URL}/study-groups/create`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(groupData),
                    credentials: 'include'
                });
                const data = await response.json();
                if (response.ok) {
                    showNotification('Study group created successfully!');
                    closeCreateModal();
                    e.target.reset();
                    fetchAndRenderGroups();
                } else {
                    showNotification(data.message || 'Failed to create study group');
                }
            } catch (error) {
                showNotification('Failed to create study group');
            }
        });
    </script>
</body>
</html>
